<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d47a1"/>
      <stop offset="100%" stop-color="#1565c0"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00bcd4"/>
      <stop offset="100%" stop-color="#1565c0"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Geometric pattern -->
  <circle cx="866" cy="371" r="27" fill="#1565c0" opacity="0.11"/>
    <circle cx="148" cy="494" r="22" fill="#1565c0" opacity="0.15"/>
    <circle cx="698" cy="613" r="57" fill="#1565c0" opacity="0.20"/>
    <circle cx="1152" cy="-32" r="67" fill="#1565c0" opacity="0.15"/>
    <circle cx="509" cy="626" r="71" fill="#1565c0" opacity="0.07"/>
    <circle cx="129" cy="444" r="70" fill="#1565c0" opacity="0.11"/>
    <rect x="152" y="27" width="89" height="67" rx="8" fill="#0d47a1" opacity="0.11" transform="rotate(32, 310, -20)"/>
    <rect x="283" y="-60" width="57" height="34" rx="8" fill="#0d47a1" opacity="0.12" transform="rotate(18, 556, 571)"/>
    <rect x="-25" y="-71" width="66" height="44" rx="8" fill="#0d47a1" opacity="0.09" transform="rotate(20, 1276, 403)"/>
    <rect x="317" y="510" width="45" height="96" rx="8" fill="#0d47a1" opacity="0.14" transform="rotate(8, 737, 671)"/>
    <rect x="808" y="331" width="67" height="53" rx="8" fill="#0d47a1" opacity="0.07" transform="rotate(22, 9, 30)"/>
    <rect x="1231" y="373" width="46" height="79" rx="8" fill="#0d47a1" opacity="0.15" transform="rotate(9, 345, -48)"/>
    <rect x="833" y="701" width="37" height="75" rx="8" fill="#0d47a1" opacity="0.10" transform="rotate(41, 174, 194)"/>
    <rect x="95" y="53" width="86" height="79" rx="8" fill="#0d47a1" opacity="0.14" transform="rotate(6, 641, 25)"/>
    <polygon points="-4,412 24,468 -32,468" fill="#1565c0" opacity="0.05"/>
    <polygon points="332,638 358,690 306,690" fill="#1565c0" opacity="0.04"/>
    <polygon points="886,-9 965,149 807,149" fill="#1565c0" opacity="0.10"/>
    <polygon points="80,101 159,259 1,259" fill="#1565c0" opacity="0.07"/>

  <!-- Wave at bottom -->
  <path d="M0,566 C360,598 840,534 1200,566 L1200,630 L0,630Z" fill="#1565c0" opacity="0.3"/>

  <!-- 중앙 텍스트 카드 -->
  <rect x="80" y="195" width="1040" height="260" rx="20" fill="rgba(0,0,0,0.35)" filter="url(#blur-bg)"/>
  <filter id="blur-bg"><feGaussianBlur stdDeviation="8"/></filter>

  <text x="600" y="270" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="44" font-weight="700" fill="#ffffff" letter-spacing="2">
    강남 셔츠룸
  </text>
  <text x="600" y="330" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="22" font-weight="400" fill="rgba(255,255,255,0.85)">
    마포 — 서버 웜업
  </text>

  <!-- Accent line -->
  <line x1="450" y1="355" x2="750" y2="355" stroke="#00bcd4" stroke-width="3" stroke-linecap="round" opacity="0.8"/>

  <!-- 하단 CTA -->
  <rect x="440" y="385" width="320" height="40" rx="20" fill="#00bcd4" opacity="0.9"/>
  <text x="600" y="411" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="16" font-weight="600" fill="#ffffff">
    ▼ 자세히 보기
  </text>

  <!-- 상단 브랜드 -->
  <text x="60" y="55" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="18" font-weight="600" fill="rgba(255,255,255,0.6)">
    마포 강남 셔츠룸 — 서버 웜업
  </text>
</svg>